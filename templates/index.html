<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #121212);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glass Card */
.container {
    width: 450px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    color: white;
}

/* Heading */
h1 {
    margin-bottom: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* Textarea */
textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    resize: none;
    font-size: 14px;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Buttons */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s ease;
}

.analyze-btn {
    background: linear-gradient(45deg, #00e676, #00c853);
    color: black;
}

.example-btn {
    background: linear-gradient(45deg, #ff1744, #d50000);
    color: white;
    margin-right: 10px;
}

button:hover {
    transform: scale(1.05);
}

.footer-text {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">
    <h1> Fake News Detector</h1>

    <form method="POST" action="/predict">
        <textarea name="news" placeholder="Paste news content here...">{{ example_news }}</textarea>
        <br>
        <button type="submit" class="analyze-btn">Analyze News</button>
    </form>

    <br>

    <a href="/example/real">
        <button class="example-btn">Try Real News</button>
    </a>

    <a href="/example/fake">
        <button class="example-btn">Try Fake News</button>
    </a>

    <div class="footer-text">
        Built with Flask & Machine Learning | Educational Purpose Only
    </div>
</div>

</body>
</html>
